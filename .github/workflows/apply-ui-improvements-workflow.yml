name: Apply Calendar Limits Update

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-ui-improvements-workflow.yml"

permissions:
  contents: write

jobs:
  apply:
    name: Apply calendar limits app files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch app files
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          changed = []

          def write_if_changed(path, content):
            file_path = Path(path)
            previous = file_path.read_text(encoding="utf-8")
            if previous != content:
              file_path.write_text(content, encoding="utf-8")
              changed.append(path)

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          hero_start = index.index('      <section class="hero-panel"')
          hero_end = index.index('      <nav class="tabs"', hero_start)
          hero = '''      <section class="hero-panel" aria-labelledby="todayTitle">
        <div class="hero-summary">
          <div class="hero-stat-card">
            <p class="panel-label" id="todayTitle">Šiandien</p>
            <div class="hero-stat-value">
              <strong id="todayUnits">0.0</strong>
              <span>vnt.</span>
            </div>
            <div class="mini-risk-meter" aria-hidden="true">
              <div id="todayRiskFill"></div>
            </div>
          </div>
          <div class="hero-stat-card">
            <p class="panel-label">Šią savaitę</p>
            <div class="hero-stat-value">
              <strong id="weekUnits">0.0</strong>
              <span>vnt.</span>
            </div>
            <div class="mini-risk-meter" aria-hidden="true">
              <div id="weekRiskFill"></div>
            </div>
          </div>
          <div class="hero-stat-card">
            <p class="panel-label">Šį mėnesį</p>
            <div class="hero-stat-value">
              <strong id="monthUnits">0.0</strong>
              <span>vnt.</span>
            </div>
            <div class="mini-risk-meter" aria-hidden="true">
              <div id="monthRiskFill"></div>
            </div>
          </div>
          <div class="hero-stat-card">
            <p class="panel-label">Šiais metais</p>
            <div class="hero-stat-value">
              <strong id="yearUnits">0.0</strong>
              <span>vnt.</span>
            </div>
            <div class="mini-risk-meter" aria-hidden="true">
              <div id="yearRiskFill"></div>
            </div>
          </div>
        </div>

        <p id="riskText" class="muted">Įrašyk pirmą gėrimą.</p>
      </section>

'''
          index = index[:hero_start] + hero + index[hero_end:]
          if 'id="monthlyLimitInput"' not in index:
            save_button = '          <button type="button" id="saveSettingsButton" class="primary-button">Išsaugoti</button>'
            extra_limits = '''          <label>
            Mėnesio riba, vnt.
            <input type="number" id="monthlyLimitInput" min="0.1" step="0.1" inputmode="decimal">
          </label>

          <label>
            Metų riba, vnt.
            <input type="number" id="yearlyLimitInput" min="0.1" step="0.1" inputmode="decimal">
          </label>

'''
            index = index.replace(save_button, extra_limits + save_button, 1)
          write_if_changed("index.html", index)

          styles_path = Path("styles.css")
          styles = styles_path.read_text(encoding="utf-8")
          css_start = styles.index(".hero-summary {")
          css_end = styles.index(".muted {", css_start)
          hero_css = '''.hero-summary {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

.hero-stat-card {
  min-width: 0;
  display: grid;
  gap: 8px;
}

.hero-stat-value {
  display: flex;
  align-items: baseline;
  gap: 4px;
  min-width: 0;
}

.hero-summary strong {
  display: block;
  font-size: 1.6rem;
  line-height: 1;
}

.hero-stat-value span {
  color: var(--text);
  font-size: 0.82rem;
  white-space: nowrap;
}

.mini-risk-meter {
  height: 7px;
  overflow: hidden;
  border-radius: 999px;
  background: #e8eee8;
}

.mini-risk-meter > div {
  width: 0%;
  height: 100%;
  border-radius: inherit;
  background: var(--accent);
  transition: width 180ms ease, background-color 180ms ease;
}

'''
          styles = styles[:css_start] + hero_css + styles[css_end:]
          mobile_anchor = '''  h1 {
    font-size: 1.7rem;
  }

'''
          mobile_hero = '''  .hero-summary {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

'''
          if mobile_hero not in styles:
            styles = styles.replace(mobile_anchor, mobile_anchor + mobile_hero, 1)
          write_if_changed("styles.css", styles)

          app_path = Path("app.js")
          app = app_path.read_text(encoding="utf-8")
          app = app.replace('''const DEFAULT_SETTINGS = {
  daily: 2,
  weekly: 14
};''', '''const DEFAULT_SETTINGS = {
  daily: 2,
  weekly: 14,
  monthly: 60,
  yearly: 730
};''', 1)
          if 'monthUnits: document.querySelector("#monthUnits")' not in app:
            app = app.replace('''  todayUnits: document.querySelector("#todayUnits"),
  weekUnits: document.querySelector("#weekUnits"),
  riskFill: document.querySelector("#riskFill"),
  riskText: document.querySelector("#riskText"),''', '''  todayUnits: document.querySelector("#todayUnits"),
  weekUnits: document.querySelector("#weekUnits"),
  monthUnits: document.querySelector("#monthUnits"),
  yearUnits: document.querySelector("#yearUnits"),
  todayRiskFill: document.querySelector("#todayRiskFill"),
  weekRiskFill: document.querySelector("#weekRiskFill"),
  monthRiskFill: document.querySelector("#monthRiskFill"),
  yearRiskFill: document.querySelector("#yearRiskFill"),
  riskText: document.querySelector("#riskText"),''', 1)
          if 'monthlyLimit: document.querySelector("#monthlyLimitInput")' not in app:
            app = app.replace('''  dailyLimit: document.querySelector("#dailyLimitInput"),
  weeklyLimit: document.querySelector("#weeklyLimitInput"),
  saveSettings: document.querySelector("#saveSettingsButton"),''', '''  dailyLimit: document.querySelector("#dailyLimitInput"),
  weeklyLimit: document.querySelector("#weeklyLimitInput"),
  monthlyLimit: document.querySelector("#monthlyLimitInput"),
  yearlyLimit: document.querySelector("#yearlyLimitInput"),
  saveSettings: document.querySelector("#saveSettingsButton"),''', 1)
          if "els.monthlyLimit.value = settings.monthly;" not in app:
            app = app.replace('''  els.dailyLimit.value = settings.daily;
  els.weeklyLimit.value = settings.weekly;

  renderDrinks();''', '''  els.dailyLimit.value = settings.daily;
  els.weeklyLimit.value = settings.weekly;
  els.monthlyLimit.value = settings.monthly;
  els.yearlyLimit.value = settings.yearly;

  renderDrinks();''', 1)

          refresh_code = '''function refresh() {
  const today = todayIso();
  const currentDate = new Date();
  const weekRange = getPeriodRange("week", currentDate);
  const monthRange = getPeriodRange("month", currentDate);
  const yearRange = getPeriodRange("year", currentDate);
  const todayEntries = entries.filter((entry) => entry.date === today);
  const weekEntries = filterEntriesByRange(weekRange);
  const monthEntries = filterEntriesByRange(monthRange);
  const yearEntries = filterEntriesByRange(yearRange);
  const todayUnits = sum(todayEntries, "units");
  const weekUnits = sum(weekEntries, "units");
  const monthUnits = sum(monthEntries, "units");
  const yearUnits = sum(yearEntries, "units");
  const statsRange = getStatsRange();
  const statsEntries = filterEntriesByRange(statsRange);
  const statsUnits = sum(statsEntries, "units");

  els.todayUnits.textContent = todayUnits.toFixed(1);
  els.weekUnits.textContent = weekUnits.toFixed(1);
  els.monthUnits.textContent = monthUnits.toFixed(1);
  els.yearUnits.textContent = yearUnits.toFixed(1);
  els.periodUnits.textContent = statsUnits.toFixed(1);
  els.periodGrams.textContent = `${Math.round(sum(statsEntries, "grams"))} g`;
  els.periodDays.textContent = new Set(statsEntries.map((entry) => entry.date)).size;
  renderStatsControls(statsRange);

  renderRisk({ today: todayUnits, week: weekUnits, month: monthUnits, year: yearUnits });
  renderBreakdown(statsEntries, STATS_EMPTY_TEXT[statsPeriodType]);
  renderHistory();
}

'''
          start = app.index("function refresh() {")
          end = app.index("function renderRisk", start)
          app = app[:start] + refresh_code + app[end:]

          risk_code = '''function renderRisk(periodUnits) {
  const limits = {
    today: Number(settings.daily) || DEFAULT_SETTINGS.daily,
    week: Number(settings.weekly) || DEFAULT_SETTINGS.weekly,
    month: Number(settings.monthly) || DEFAULT_SETTINGS.monthly,
    year: Number(settings.yearly) || DEFAULT_SETTINGS.yearly
  };

  setRiskMeter(els.todayRiskFill, periodUnits.today, limits.today);
  setRiskMeter(els.weekRiskFill, periodUnits.week, limits.week);
  setRiskMeter(els.monthRiskFill, periodUnits.month, limits.month);
  setRiskMeter(els.yearRiskFill, periodUnits.year, limits.year);

  const reachedLimit = Object.keys(limits).some((key) => {
    const units = Number(periodUnits[key]) || 0;
    return units >= limits[key];
  });

  if (!entries.length) {
    els.riskText.textContent = "Įrašyk pirmą gėrimą.";
  } else if (reachedLimit) {
    els.riskText.textContent = "Pasiekta arba viršyta bent viena pasirinkta riba.";
  } else {
    els.riskText.textContent = "Pasirinktos ribos dar nepasiektos.";
  }
}

function setRiskMeter(element, units, limit) {
  const value = Number(units) || 0;
  const max = Number(limit) || 0;
  const ratio = max > 0 ? value / max : 0;
  const percent = Math.min(100, Math.round(ratio * 100));

  element.style.width = `${percent}%`;
  element.style.backgroundColor = ratio >= 1 ? "#b42318" : "#0f5132";
}

'''
          start = app.index("function renderRisk")
          end = app.index("function renderBreakdown", start)
          app = app[:start] + risk_code + app[end:]

          range_code = '''function getStatsRange() {
  return getPeriodRange(statsPeriodType, statsAnchorDate);
}

function getPeriodRange(periodType, anchorDate) {
  const anchor = cloneDate(anchorDate);
  let start;
  let end;
  let label;

  if (periodType === "week") {
    start = startOfWeek(anchor);
    end = addDays(start, 6);
    label = `${dateToIso(start)} - ${dateToIso(end)}`;
  } else if (periodType === "month") {
    start = new Date(anchor.getFullYear(), anchor.getMonth(), 1);
    end = new Date(anchor.getFullYear(), anchor.getMonth() + 1, 0);
    label = `${anchor.getFullYear()} ${MONTH_NAMES[anchor.getMonth()]}`;
  } else {
    start = new Date(anchor.getFullYear(), 0, 1);
    end = new Date(anchor.getFullYear(), 11, 31);
    label = `${anchor.getFullYear()} metai`;
  }

  return {
    startIso: dateToIso(start),
    endIso: dateToIso(end),
    label
  };
}

function filterEntriesByRange(range) {
  return entries.filter((entry) => entry.date >= range.startIso && entry.date <= range.endIso);
}

'''
          start = app.index("function getStatsRange()")
          end = app.index("function updatePreview()", start)
          app = app[:start] + range_code + app[end:]

          save_code = '''function saveSettings() {
  settings = {
    daily: Number(els.dailyLimit.value) || DEFAULT_SETTINGS.daily,
    weekly: Number(els.weeklyLimit.value) || DEFAULT_SETTINGS.weekly,
    monthly: Number(els.monthlyLimit.value) || DEFAULT_SETTINGS.monthly,
    yearly: Number(els.yearlyLimit.value) || DEFAULT_SETTINGS.yearly
  };

  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  refresh();
}

'''
          start = app.index("function saveSettings()")
          end = app.index("function clearHistory()", start)
          app = app[:start] + save_code + app[end:]
          write_if_changed("app.js", app)

          sw_path = Path("service-worker.js")
          sw = sw_path.read_text(encoding="utf-8")
          sw = re.sub(r'const CACHE_NAME = "alko-vienetai-v\d+";', 'const CACHE_NAME = "alko-vienetai-v10";', sw, count=1)
          write_if_changed("service-worker.js", sw)

          print("Changed files:", ", ".join(changed) if changed else "none")
          PY

      - name: Validate JavaScript
        run: |
          node --check app.js
          node --check service-worker.js

      - name: Commit updated app files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css app.js service-worker.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Add calendar limits and summary"
          git push
