name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create Android Project
        run: |
          mkdir app
          cd app

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.carmapoints.alko'
              compileSdk 34

              defaultConfig {
                  applicationId "com.carmapoints.alko"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }

          dependencies {}
          EOF

      - name: Build Placeholder APK
        run: echo "APK build placeholder"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: .
