name: Build Android Debug APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Generate Android WebView project
        run: |
          rm -rf android-app
          mkdir -p android-app/app/src/main/java/eu/ldk2026/alkovienetai
          mkdir -p android-app/app/src/main/res/drawable
          mkdir -p android-app/app/src/main/res/values

          cat > android-app/settings.gradle <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "AlkoVienetai"
          include ":app"
          EOF

          cat > android-app/build.gradle <<'EOF'
          plugins {
              id "com.android.application" version "8.7.3" apply false
          }
          EOF

          cat > android-app/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.nonTransitiveRClass=true
          EOF

          cat > android-app/app/build.gradle <<'EOF'
          plugins {
              id "com.android.application"
          }

          android {
              namespace "eu.ldk2026.alkovienetai"
              compileSdk 35

              defaultConfig {
                  applicationId "eu.ldk2026.alkovienetai"
                  minSdk 23
                  targetSdk 35
                  versionCode 1
                  versionName "1.0.0"
              }
          }
          EOF

          cat > android-app/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />

              <application
                  android:allowBackup="true"
                  android:icon="@drawable/ic_launcher_foreground"
                  android:label="Alko Vienetai"
                  android:roundIcon="@drawable/ic_launcher_foreground"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > android-app/app/src/main/java/eu/ldk2026/alkovienetai/MainActivity.java <<'EOF'
          package eu.ldk2026.alkovienetai;

          import android.annotation.SuppressLint;
          import android.app.Activity;
          import android.graphics.Color;
          import android.os.Bundle;
          import android.view.ViewGroup;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;

          public class MainActivity extends Activity {
              private WebView webView;

              @SuppressLint("SetJavaScriptEnabled")
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  getWindow().setStatusBarColor(Color.rgb(15, 81, 50));
                  getWindow().setNavigationBarColor(Color.rgb(246, 247, 242));

                  webView = new WebView(this);
                  webView.setLayoutParams(new ViewGroup.LayoutParams(
                          ViewGroup.LayoutParams.MATCH_PARENT,
                          ViewGroup.LayoutParams.MATCH_PARENT
                  ));
                  webView.setWebViewClient(new WebViewClient());

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);

                  setContentView(webView);
                  webView.loadUrl("https://ldk2026.github.io/alko-vienetai/");
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                      return;
                  }

                  super.onBackPressed();
              }
          }
          EOF

          cat > android-app/app/src/main/res/drawable/ic_launcher_foreground.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path android:fillColor="#0f5132" android:pathData="M0,0h108v108h-108z" />
              <path
                  android:fillColor="#ffffff"
                  android:fillAlpha="0.94"
                  android:pathData="M32,22h44l-7,38c-2,10 -9,16 -15,16s-13,-6 -15,-16z" />
              <path
                  android:fillColor="#e2bd56"
                  android:pathData="M39,43h30l-4,17c-2,7 -6,11 -11,11s-9,-4 -11,-11z" />
              <path
                  android:strokeColor="#ffffff"
                  android:strokeWidth="6"
                  android:strokeLineCap="round"
                  android:fillColor="@android:color/transparent"
                  android:pathData="M54,76v14M40,91h28" />
          </vector>
          EOF

          cat > android-app/app/src/main/res/values/colors.xml <<'EOF'
          <resources>
              <color name="brand_green">#0f5132</color>
              <color name="screen_background">#f6f7f2</color>
          </resources>
          EOF

          cat > android-app/app/src/main/res/values/styles.xml <<'EOF'
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.Light.NoActionBar">
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:statusBarColor">@color/brand_green</item>
                  <item name="android:navigationBarColor">@color/screen_background</item>
                  <item name="android:windowBackground">@color/screen_background</item>
              </style>
          </resources>
          EOF

      - name: Show generated files
        run: |
          find android-app -maxdepth 8 -type f | sort

      - name: Show Gradle projects
        working-directory: android-app
        run: gradle --no-daemon projects

      - name: Build debug APK
        working-directory: android-app
        run: gradle --no-daemon :app:assembleDebug

      - name: Collect APK
        run: |
          mkdir -p apk-output
          cp android-app/app/build/outputs/apk/debug/app-debug.apk apk-output/alko-vienetai-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: alko-vienetai-debug-apk
          path: apk-output/alko-vienetai-debug.apk
          if-no-files-found: error
