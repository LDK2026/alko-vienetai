name: Build Android Debug APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Bubblewrap project
        run: |
          mkdir -p android-build
          cp twa-manifest.json android-build/twa-manifest.json

      - name: Generate Android project
        run: |
          docker run --rm \
            -w /app \
            -v "${{ github.workspace }}/android-build:/app" \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            update --manifest=/app/twa-manifest.json

      - name: Build unsigned APK
        run: |
          docker run --rm \
            -w /app \
            -v "${{ github.workspace }}/android-build:/app" \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            build --skipSigning --skipPwaValidation --manifest=/app/twa-manifest.json

      - name: Show generated files
        if: always()
        run: |
          find android-build -maxdepth 4 -type f | sort

      - name: Collect APK
        run: |
          mkdir -p apk-output
          APK_PATH="$(find android-build -type f -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK file was generated"
            exit 1
          fi
          cp "$APK_PATH" apk-output/alko-vienetai-unsigned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: alko-vienetai-unsigned-apk
          path: apk-output/alko-vienetai-unsigned.apk
          if-no-files-found: error
