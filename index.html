<!doctype html>
<html lang="lt">
  <head>
   <link rel="manifest" href="/alko-vienetai/manifest.webmanifest">

<meta name="theme-color" content="#0f5132">
<meta name="application-name" content="Alko Vienetai">

<link rel="apple-touch-icon" href="/alko-vienetai/assets/app-icon-192.png">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Vienetai">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
  </head>

  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">PWA versija</p>
          <h1>Alko Vienetai</h1>
        </div>

        <button class="icon-button" id="shareButton" aria-label="Dalintis">
          ↗
        </button>
      </header>

      <main>
        <section class="hero-panel">
          <div>
            <p class="panel-label">Šiandien</p>
            <strong id="todayUnits">0.0</strong>
            <span>vienetų</span>
          </div>

          <div class="risk-meter">
            <div id="riskFill"></div>
          </div>

          <p id="riskText" class="muted">
            Įrašyk pirmą gėrimą.
          </p>
        </section>

        <nav class="tabs">
          <button class="tab active" data-tab="log">Įrašas</button>
          <button class="tab" data-tab="stats">Statistika</button>
          <button class="tab" data-tab="history">Istorija</button>
          <button class="tab" data-tab="settings">Ribos</button>
        </nav>

        <!-- LOG -->
        <section class="screen active" id="logScreen">
          <form id="drinkForm" class="form-panel">
            <label>
              Data
              <input type="date" id="dateInput" required />
            </label>

            <div class="drink-grid" id="drinkGrid"></div>

            <div class="split">
              <label>
                Kiekis (ml)
                <input type="number" id="amountInput" required />
              </label>

              <label>
                ABV %
                <input type="number" id="abvInput" required />
              </label>
            </div>

            <div class="calculation-preview">
              <span id="previewText">Pasirink gėrimą</span>
              <strong id="previewUnits">0.0 vnt.</strong>
            </div>

            <button type="submit" class="primary-button">
              Pridėti
            </button>
          </form>
        </section>

        <!-- STATS -->
        <section class="screen" id="statsScreen">
          <div class="summary-grid">
            <div>
              <span>Per laikotarpį</span>
              <strong id="periodUnits">0.0</strong>
            </div>
            <div>
              <span>Gryno alkoholio</span>
              <strong id="periodGrams">0</strong>
            </div>
            <div>
              <span>Dienos</span>
              <strong id="periodDays">0</strong>
            </div>
          </div>

          <div id="drinkBreakdown"></div>
        </section>

        <!-- HISTORY -->
        <section class="screen" id="historyScreen">
          <div id="historyList"></div>
        </section>

        <!-- SETTINGS -->
        <section class="screen" id="settingsScreen">
          <div class="form-panel">
            <label>
              Dienos riba
              <input type="number" id="dailyLimitInput" />
            </label>

            <label>
              Savaitės riba
              <input type="number" id="weeklyLimitInput" />
            </label>

            <button type="button" id="saveSettingsButton" class="primary-button">
              Išsaugoti
            </button>
          </div>
        </section>
      </main>
    </div>

    <template id="drinkCardTemplate">
      <button class="drink-card">
        <img />
        <span></span>
        <small></small>
      </button>
    </template>

    <script src="app.js"></script>
  </body>
</html>
